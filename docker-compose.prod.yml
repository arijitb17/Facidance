# ═══════════════════════════════════════════════════════════════
#  docker-compose.prod.yml
#  Used ON THE VPS — pulls pre-built images from GHCR.
#  Run:  docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

version: "3.9"

x-python-env: &python-env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  PYTHON_API_URL: http://face:8004

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-facidance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  migrate:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prisma:/app/prisma
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "npm install -g prisma &&
             prisma migrate deploy --schema=/app/prisma/schema.prisma"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  auth:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-auth:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    networks: [internal]

  admin:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-admin:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    networks: [internal]

  teacher:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-teacher:latest
    restart: unless-stopped
    environment:
      <<: *python-env
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    networks: [internal]

  student:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-student:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres: { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    networks: [internal]

  face:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-face:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - face_embeddings:/app/backend/face_embeddings.pkl
    networks: [internal]

  frontend:
    image: ${IMAGE_BASE:-ghcr.io/yourorg/facidance}-frontend:latest
    restart: unless-stopped
    depends_on: [auth, admin, teacher, student]
    networks: [internal]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on: [frontend, auth, admin, teacher, student, face]
    networks: [internal]

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks: [internal]

volumes:
  postgres_data:
  face_embeddings:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge