# ═══════════════════════════════════════════════════════════════
#  docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════════

version: "3.9"

x-python-env: &python-env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  PYTHON_API_URL: http://face:8004

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-facidance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  migrate:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prisma:/app/prisma
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "apt-get update -y && apt-get install -y openssl &&
             npm install -g prisma@5 &&
             prisma migrate deploy --schema=/app/prisma/schema.prisma"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  seed:
    image: node:20-slim
    working_dir: /app/prisma
    volumes:
      - ./prisma:/app/prisma
      - ./backend:/app/backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "apt-get update -y && apt-get install -y openssl &&
            npm install &&
            npx prisma generate &&
            node seed.cjs"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - internal

  auth:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-auth:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks: [internal]

  admin:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-admin:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks: [internal]

  teacher:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-teacher:latest
    restart: unless-stopped
    environment:
      <<: *python-env
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks: [internal]

  student:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-student:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks: [internal]

  face:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-face:latest
    restart: unless-stopped
    environment: { <<: *python-env }
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks: [internal]

  frontend:
    image: ${IMAGE_BASE:-ghcr.io/arijitb17/facidance}-frontend:latest
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}
      NEXT_PUBLIC_TEACHER_API_URL: ${NEXT_PUBLIC_TEACHER_API_URL}
      NEXT_PUBLIC_STUDENT_API_URL: ${NEXT_PUBLIC_STUDENT_API_URL}
    depends_on: [auth, admin, teacher, student]
    networks: [internal]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on: [frontend, auth, admin, teacher, student, face]
    networks: [internal]

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge