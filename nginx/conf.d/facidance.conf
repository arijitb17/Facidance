# ─── Upstreams ───────────────────────────────────────────────
upstream frontend  { server frontend:3000; }
upstream auth      { server auth:8000; }
upstream admin_svc { server admin:8001; }
upstream teacher   { server teacher:8002; }
upstream student   { server student:8003; }
upstream face      { server face:8004; }

# ─── HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name facidance.online www.facidance.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS SERVER ────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name facidance.online www.facidance.online;

    ssl_certificate     /etc/letsencrypt/live/facidance.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facidance.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # ───────── AUTH ─────────
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;

        proxy_pass http://auth/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── ADMIN ─────────
    location /admin-api/ {
        limit_req zone=api burst=30 nodelay;

        # FIX: remove /admin-api prefix only
        rewrite ^/admin-api/(.*)$ /$1 break;

        proxy_pass http://admin_svc;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── TEACHER ─────────
    location /teacher-api/ {
        limit_req zone=api burst=30 nodelay;

        rewrite ^/teacher-api/(.*)$ /$1 break;

        proxy_pass http://teacher;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── STUDENT ─────────
    location /student-api/ {
        limit_req zone=api burst=30 nodelay;

        rewrite ^/student-api/(.*)$ /$1 break;

        proxy_pass http://student;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /face-api/ {
        limit_req zone=api burst=10 nodelay;

        rewrite ^/face-api/(.*)$ /$1 break;

        proxy_pass http://face;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🔥 IMPORTANT FIX
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        send_timeout 300s;
    }

    # ───────── FRONTEND ─────────
    location / {
        proxy_pass http://frontend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}