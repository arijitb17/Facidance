# ═══════════════════════════════════════════════════════════════
#  nginx/conf.d/facidance.conf
#  Replace facidance.online with your actual domain everywhere.
# ═══════════════════════════════════════════════════════════════

# ─── Upstream definitions ────────────────────────────────────
upstream frontend  { server frontend:3000; }
upstream auth      { server auth:8000;     }
upstream admin_svc { server admin:8001;    }
upstream teacher   { server teacher:8002;  }
upstream student   { server student:8003;  }
upstream face      { server face:8004;     }

# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    server_name facidance.online www.facidance.online;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main server ───────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name facidance.online www.facidance.online;

    ssl_certificate     /etc/letsencrypt/live/facidance.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facidance.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;   # for face image uploads

    # ── Auth service (/auth/*) ───────────────────────────────
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass         http://auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Admin service (/admin-api/*) ─────────────────────────
    location /admin-api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://admin_svc/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Teacher service (/teacher-api/*) ─────────────────────
    location /teacher-api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://teacher/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Student service (/student-api/*) ─────────────────────
    location /student-api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://student/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Face-recognition service (/face-api/*) ───────────────
    location /face-api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass            http://face/;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;   # face processing can be slow
        proxy_send_timeout    120s;
    }

    # ── Next.js frontend (everything else) ───────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";  # WebSocket support
    }
}