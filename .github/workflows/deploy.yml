# ═══════════════════════════════════════════════════════════════
#  .github/workflows/deploy.yml
#
#  Trigger: push to `main` branch
#  Pipeline:
#    1. Lint / test (Python + Node)
#    2. Build all Docker images
#    3. Push to GitHub Container Registry (ghcr.io)
#    4. SSH into VPS and pull + restart containers
# ═══════════════════════════════════════════════════════════════

name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # e.g.  ghcr.io/yourgithubusername/facidance
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/facidance

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Test
  # ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r backend/requirements.txt ruff

      - name: Lint Python (ruff)
        run: ruff check backend/

      # ── Node.js ───────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Lint Next.js
        working-directory: frontend
        run: npm run lint --if-present

      - name: Type-check Next.js
        working-directory: frontend
        run: npm run type-check --if-present

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker images
  # Runs only on push to main (not on PRs)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: docker/Dockerfile.frontend
          - service: auth
            dockerfile: docker/Dockerfile.auth
          - service: admin
            dockerfile: docker/Dockerfile.admin
          - service: teacher
            dockerfile: docker/Dockerfile.teacher
          - service: student
            dockerfile: docker/Dockerfile.student
          - service: face
            dockerfile: docker/Dockerfile.face

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            NEXT_PUBLIC_AUTH_URL=${{ secrets.NEXT_PUBLIC_AUTH_URL }}
            NEXT_PUBLIC_ADMIN_API_URL=${{ secrets.NEXT_PUBLIC_ADMIN_API_URL }}
            NEXT_PUBLIC_TEACHER_API_URL=${{ secrets.NEXT_PUBLIC_TEACHER_API_URL }}
            NEXT_PUBLIC_STUDENT_API_URL=${{ secrets.NEXT_PUBLIC_STUDENT_API_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to VPS via SSH
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          envs:     GHCR_TOKEN,GITHUB_ACTOR,IMAGE_BASE
          script: |
            set -e
            cd /opt/facidance
            git pull origin main

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            IMAGE_BASE=$IMAGE_BASE docker compose -f docker-compose.prod.yml pull
            IMAGE_BASE=$IMAGE_BASE docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
            echo "✅ Deployment complete"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for commit ${{ github.sha }}"